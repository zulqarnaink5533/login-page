<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<style>
    /* Reset */

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Body */

    body {
        font-family: Arial, Helvetica, sans-serif;
        background: #0fedb9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 5pv;
    }

    /* Container */

    .container {
        width: 600px;
        padding: 20px 35px;
        background: #ffffff;
        padding: 40px 20px;
        border-radius: 80px;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.15);
    }

    /* Heading */

    h1 {
        text-align: center;
        font-size: 40px;
        margin-bottom: 20px;
        color: #dc1313;
    }

    /* Labels */

    label {
        display: block;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 5px;
        font-size: 18px;
        color: #dc0404;
    }

    /* Input & Textarea */

    input,
    textarea {
        height: 50px;
        width: 100%;
        padding: 10px 15px;
        font-size: 18px;
        border: 1px solid #ed0000;
        border-radius: 50px;
        outline: none;
        margin-bottom: 15px;
    }

    input:focus,
    textarea:focus {
        border-color: #ed003f;
    }

    /* Textarea */

    textarea {
        resize: none;
    }

    /* Button */

    button {
        width: 100%;
        padding: 16px;
        background: #ff0000;
        color: white;
        font-size: 20px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.5s;
    }

    button:hover {
        background: #06bdf0;
    }
</style>

<body>

    <div class="container">

        <h1>Contact Us</h1>

        <form>
            <label for="fullname">Full Name</label><br>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your name">
            <br><br>

            <label for="email">Email Address</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email">
            <br><br>

            <label for="subject">Subject</label><br>
            <input type="text" id="subject" name="subject" placeholder="Enter subject">
            <br><br>

            <label for="message">Message</label><br>
            <textarea id="message" name="message" rows="8" placeholder="Write your message here..."></textarea>
            <br><br>

            <button type="submit">Send Message</button>

        </form>

    </div>

</body>

</html>
